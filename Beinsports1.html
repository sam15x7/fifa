<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="referrer" content="no-referrer">
  <title>The Predictor Player</title> 
  
  <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Orbitron:wght@800&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
  
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      height: 100dvh; /* Dynamic viewport fix for mobile browsers */
      background: #000;
      overflow: hidden;
      font-family: 'Segoe UI', Roboto, sans-serif;
    }
    .player-wrap {
      width: 100%;
      height: 100%;
      background: #000;
      position: relative;
    }
    
    /* ── STRICT SIZING FOR PLYR WRAPPER ── */
    .plyr, .plyr__video-wrapper {
      width: 100%;
      height: 100% !important;
    }
    .plyr__video-wrapper video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }

    .plyr--video .plyr__control--overlaid {
      left: 50% !important;
      top: 50% !important;
      transform: translate(-50%, -50%) !important;
    }
    
    /* ── THE PREDICTOR WATERMARK STYLES ── */
    #custom-watermark {
      position: absolute;
      left: 50%;
      bottom: 62px;
      transform: translateX(-50%);
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      opacity: 0.65;
      pointer-events: none; 
      transition: opacity .3s, bottom .3s;
      text-align: center;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.8));
    }
    
    .wm-name {
      font-family: 'Orbitron', sans-serif;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 1px;
      color: #fff;
      text-transform: uppercase;
    }
    
    .wm-name .highlight { color: #00a8ff; /* Brand Blue */ } 
    
    .wm-url {
      font-family: 'Rajdhani', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.7);
      text-transform: uppercase;
    }
    
    .plyr:fullscreen #custom-watermark,
    .plyr:-webkit-full-screen #custom-watermark {
      bottom: 70px;
      opacity: 0.75;
    }
  </style>
</head>
<body>

  <div class="player-wrap">
    <video id="player" controls playsinline webkit-playsinline preload="metadata"></video>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
  
  <script>
    (function () {
      const video = document.getElementById('player');
      const params = new URLSearchParams(location.search);
      
      // 1. Parse URL Parameters
      let videoURL = params.get('url') || params.get('x') || params.get('dtv');
      let pageTitle = params.get('title');

      // Fallback URL for static testing
      if (!videoURL) {
          videoURL = 'https://stream.sports3.win/iptv/live/signal-4459803-10352.m3u8'; 
      }
      
      // Dynamically update the browser tab title if provided
      if (pageTitle) {
          document.title = pageTitle;
      }

      function addWatermark(player) {
        const wm = document.createElement('div');
        wm.id = 'custom-watermark';
        
        wm.innerHTML = 
          '<div class="wm-name">THE <span class="highlight">PREDICTOR</span></div>' +
          '<div class="wm-url">predictorwc.vercel.app</div>';

        player.elements.container.appendChild(wm);
      }

      const defaultOptions = {
        fullscreen: { enabled: true, fallback: true, iosNative: true }
      };

      // 2. Check for standard HLS.js support (Chrome, Firefox, Android, Windows, etc.)
      if (Hls.isSupported()) {
        const hls = new Hls();
        hls.loadSource(videoURL);
        hls.attachMedia(video);
        
        hls.on(Hls.Events.MANIFEST_PARSED, function () {
          const qualities = [];
          hls.levels.forEach(function (level) {
            if (!qualities.includes(level.height)) qualities.push(level.height);
          });
          qualities.sort(function (a, b) { return b - a; });
          
          const player = new Plyr(video, {
            ...defaultOptions,
            settings: ['quality', 'speed', 'fullscreen'],
            quality: {
              default: qualities[0] || 720,
              options: qualities,
              forced: true,
              onChange: function (q) {
                hls.levels.forEach(function (level, index) {
                  if (level.height === q) hls.currentLevel = index;
                });
              }
            }
          });
          
          addWatermark(player);
          video.play().catch(e => console.log("Autoplay blocked"));
        });
      } 
      // 3. Fallback to Native Apple HLS (iOS, iPadOS, Mac Safari)
      else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = videoURL;
        const player = new Plyr(video, defaultOptions);
        
        // Wait for metadata to load before trying to interact
        video.addEventListener('loadedmetadata', function() {
          addWatermark(player);
          video.play().catch(e => console.log("Autoplay blocked"));
        });
      } else {
        console.error("HLS is not supported in this browser.");
      }

      // Auto-landscape on mobile fullscreen
      document.addEventListener('fullscreenchange', () => {
        if (document.fullscreenElement && screen.orientation?.lock) {
          screen.orientation.lock('landscape').catch(() => {});
        } else if (screen.orientation?.unlock) {
          screen.orientation.unlock();
        }
      });

    })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <title>The Predictor Player</title>
  
  <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/shaka-player.ui.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/controls.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    
    html, body {
      width: 100%;
      height: 100%;
      height: 100dvh; /* Dynamic viewport fix for mobile browsers */
      background: #000;
      overflow: hidden;
      font-family: system-ui, -apple-system, sans-serif;
    }
    
    .shaka-video-container {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }
    
    .shaka-spinner-container { display: none !important; }
    
    /* ── THE PREDICTOR WATERMARK STYLES ── */
    #wm {
      position: absolute;
      bottom: 70px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2147483647;
      pointer-events: none;
      user-select: none;
      display: flex;
      align-items: center;
      gap: 8px;
      opacity: .55;
      transition: opacity .5s;
    }
    
    .wm-rule {
      width: 25px;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(0, 168, 255, .9)); 
    }
    
    .wm-rule.r {
      background: linear-gradient(90deg, rgba(0, 168, 255, .9), transparent);
    }
    
    .wm-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
    }
    
    .wm-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 16px;
      letter-spacing: 4px;
      line-height: 1;
      color: #fff;
      white-space: nowrap;
      text-shadow: 0 1px 8px #000, 0 0 24px rgba(0,0,0,.9);
    }
    
    .wm-name .r { color: #00a8ff; /* Brand Blue */ } 
    
    .wm-url {
      font-family: 'Rajdhani', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 3px;
      color: rgba(255,255,255,.7);
      white-space: nowrap;
      text-shadow: 0 1px 6px rgba(0,0,0,.9);
      text-transform: uppercase;
      margin-top: 2px;
    }
  </style>
</head>
<body>

  <div class="shaka-video-container" id="player-container">
    <video id="video" autoplay playsinline></video>
    
    <div id="wm">
      <div class="wm-rule"></div>
      <div class="wm-inner">
        <div class="wm-name">THE <span class="r">PREDICTOR</span></div>
        <div class="wm-url">predictorwc.vercel.app</div>
      </div>
      <div class="wm-rule r"></div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      shaka.polyfill.installAll();
      
      if (!shaka.Player.isBrowserSupported()) {
          console.error("Browser not supported!");
          return;
      }
      
      const videoEl = document.getElementById('video');
      const container = document.getElementById('player-container');
      const wm = document.getElementById('wm');
      
      // Stream Details
      const streamUrl = "https://otte.cache.aiv-cdn.net/bom-nitro/live/clients/dash/enc/x0srg3jjpz/out/v1/f779c49314394d61886d63f58d9d52e4/cenc.mpd";
      const keyId = "4f4c3a9912ea752e88f4497864a1bc8b";
      const key = "278128004fe8c6ffb2cd2a0c154a241a";
      
      const player = new shaka.Player();
      await player.attach(videoEl);
      
      const ui = new shaka.ui.Overlay(player, container, videoEl);
      ui.configure({
        controlPanelElements: ['play_pause','mute','volume','time_and_duration','spacer','language','captions','picture_in_picture','quality','fullscreen'],
        seekBarColors: { base:'white', buffered:'rgba(255,255,255,0.3)', played:'#00a8ff' } /* Updated seekbar to brand color */
      });
      
      // Inject watermark after UI builds
      setTimeout(() => container.appendChild(wm), 100);
      
      player.configure({
        drm: { clearKeys: { [keyId]: key } },
        abr: { defaultBandwidthEstimate:10000, enabled:true, switchInterval:1 },
        manifest: {
          defaultPresentationDelay: 4,
          dash: { ignoreSuggestedPresentationDelay:true, ignoreMinBufferTime:true, autoCorrectDrift:true }
        },
        streaming: {
          bufferingGoal:8, rebufferingGoal:2, bufferBehind:10,
          lowLatencyMode:true, safeSeekOffset:4, stallThreshold:1, jumpLargeGaps:true
        }
      });
      
      try {
        await player.load(streamUrl, -4);
        videoEl.play().catch(e => console.log("Autoplay blocked by browser."));
      } catch(e) {
          console.error("Error loading stream:", e);
      }
      
      // Fullscreen watermark fix
      const onFsChange = () => {
        const fsEl = document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement;
        if(fsEl) { 
            fsEl.appendChild(wm); 
            wm.style.opacity='.50'; 
            
            // Mobile auto-landscape logic
            if (screen.orientation?.lock) {
                screen.orientation.lock('landscape').catch(() => {});
            }
        } else { 
            container.appendChild(wm); 
            wm.style.opacity='.55'; 
            
            if (screen.orientation?.unlock) {
                screen.orientation.unlock();
            }
        }
      };
      
      document.addEventListener('fullscreenchange', onFsChange);
      document.addEventListener('webkitfullscreenchange', onFsChange);
      document.addEventListener('mozfullscreenchange', onFsChange);
      
      // Watermark fade logic
      videoEl.addEventListener('play', () => setTimeout(()=>{ wm.style.opacity='.30'; }, 3000));
      videoEl.addEventListener('pause', () => { wm.style.opacity='.55'; });
      
      const resetFade = () => {
        wm.style.opacity='.55';
        clearTimeout(window._wmTimer);
        window._wmTimer = setTimeout(()=>{ if(!videoEl.paused) wm.style.opacity='.30'; }, 3000);
      };
      
      document.addEventListener('mousemove', resetFade);
      document.addEventListener('touchstart', resetFade);
    });
  </script>
</body>
</html>
